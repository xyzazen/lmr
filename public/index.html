<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumarge — Lua/Luau Obfuscator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@300;400;600&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--bg2:#0d1117;--bg3:#111820;
  --border:#1e2d3d;--border2:#2a3f55;
  --accent:#00d4ff;--accent2:#7b61ff;
  --text:#c8d8e8;--text2:#7a9ab5;--text3:#3d5570;
  --success:#00ff88;--error:#ff4d6d;--warn:#ffd700;
  --r:7px;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;line-height:1.5;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;z-index:0;
}
#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:rgba(8,11,16,.9);backdrop-filter:blur(10px);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:30px;height:30px;border-radius:6px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.logo-name{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-tag{font-size:9px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-top:-1px}
.hbadge{
  display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);
  background:rgba(0,0,0,.3);border:1px solid var(--border);
  padding:5px 10px;border-radius:16px;
}
.hdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:.3s}
.hdot.ok{background:var(--success);box-shadow:0 0 6px var(--success)}
.hdot.err{background:var(--error);box-shadow:0 0 6px var(--error)}
.hdot.spin{background:var(--warn);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Body */
.body{display:flex;flex:1;overflow:hidden;min-height:0}

/* Sidebar */
.sidebar{
  width:255px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;
}
.sb-head{
  padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);flex-shrink:0;
}
.sb-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:14px}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.og{display:flex;flex-direction:column;gap:6px}
.ol{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);font-weight:600;display:flex;align-items:center;gap:5px;
}
.ol::before{content:'▸';opacity:.5;font-size:8px}

.vpills{display:flex;gap:4px}
.vpill{
  flex:1;padding:5px 0;text-align:center;border-radius:5px;font-size:10px;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  transition:.12s;font-family:'JetBrains Mono',monospace;
}
.vpill:hover{border-color:var(--accent);color:var(--accent)}
.vpill.on{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}

.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{
  padding:4px 10px;border-radius:16px;font-size:10px;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  transition:.12s;font-family:'JetBrains Mono',monospace;
}
.pill:hover{border-color:var(--accent2);color:var(--accent2)}
.pill.on{background:rgba(123,97,255,.15);border-color:var(--accent2);color:var(--accent2)}

select{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:6px 8px;border-radius:var(--r);outline:none;appearance:none;
  transition:border-color .15s;cursor:pointer;
}
select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}

.seed-row{display:flex;gap:5px}
.seed-row input{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:6px 8px;border-radius:var(--r);outline:none;
}
.seed-row input:focus{border-color:var(--accent)}
.seed-row input::placeholder{color:var(--text3)}
.dice{
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  padding:0 9px;border-radius:var(--r);cursor:pointer;font-size:13px;
  transition:.12s;display:flex;align-items:center;
}
.dice:hover{border-color:var(--accent2);color:var(--accent2)}

.trow{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.trow span{font-size:11px;color:var(--text2)}
.tog{position:relative;width:34px;height:18px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.sld{
  position:absolute;inset:0;background:var(--bg3);
  border:1px solid var(--border);border-radius:18px;cursor:pointer;transition:.2s;
}
.sld::before{
  content:'';position:absolute;width:12px;height:12px;
  left:2px;top:50%;transform:translateY(-50%);
  background:var(--text3);border-radius:50%;transition:.2s;
}
.tog input:checked+.sld{background:var(--accent2);border-color:var(--accent2)}
.tog input:checked+.sld::before{left:18px;background:#fff}

.div{height:1px;background:var(--border);margin:2px 0}

.btn-go{
  width:100%;padding:11px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;border-radius:var(--r);color:#fff;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:.15s;box-shadow:0 0 20px rgba(123,97,255,.3);
}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(123,97,255,.5)}
.btn-go:active{transform:translateY(0)}
.btn-go:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-go.busy{animation:gpulse 1s infinite}
@keyframes gpulse{0%,100%{box-shadow:0 0 20px rgba(123,97,255,.3)}50%{box-shadow:0 0 35px rgba(123,97,255,.6)}}

.btn-clr{
  width:100%;padding:7px;background:transparent;border:1px solid var(--border);
  color:var(--text3);font-family:'JetBrains Mono',monospace;
  font-size:10px;border-radius:var(--r);cursor:pointer;transition:.12s;
}
.btn-clr:hover{border-color:var(--error);color:var(--error)}

.kbhint{font-size:9px;color:var(--text3);text-align:center}
kbd{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:3px;padding:1px 4px;font-size:9px;
}

/* Editors */
.editors{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.panels{flex:1;display:flex;min-height:0;overflow:hidden}

.panel{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;min-width:0}
.panel:last-child{border-right:none}

.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;height:36px;
}
.ptitle{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text2);letter-spacing:.06em}
.pdot{width:9px;height:9px;border-radius:50%}
.d-in{background:#ffbd44}
.d-out{background:var(--text3);transition:.3s}
.d-out.done{background:var(--success);box-shadow:0 0 7px var(--success)}

.pacts{display:flex;gap:4px}
.ibtn{
  background:transparent;border:1px solid var(--border);color:var(--text3);
  padding:3px 7px;border-radius:4px;cursor:pointer;font-size:10px;
  transition:.12s;font-family:'JetBrains Mono',monospace;
}
.ibtn:hover{border-color:var(--accent);color:var(--accent)}

/* Editor with line numbers — KEY: overflow hidden on ew, scroll on textarea */
.ew{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}
.ln{
  background:var(--bg2);color:var(--text3);
  font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;
  padding:10px 8px 10px 10px;text-align:right;user-select:none;
  border-right:1px solid var(--border);min-width:40px;
  overflow:hidden;white-space:pre;flex-shrink:0;
}
textarea{
  flex:1;background:var(--bg);border:none;outline:none;resize:none;
  color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:12px;line-height:1.7;padding:10px 12px;
  tab-size:2;overflow:auto;word-wrap:off;white-space:pre;
}
textarea::placeholder{color:var(--text3)}
textarea:read-only{cursor:default}

/* Spinner */
.spin-ov{
  display:none;position:absolute;inset:0;
  background:rgba(8,11,16,.75);backdrop-filter:blur(2px);
  flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:10;
}
.spin-ov.on{display:flex}
.ring{
  width:36px;height:36px;border:2px solid var(--border2);
  border-top-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-lbl{font-size:10px;color:var(--text2);letter-spacing:.12em}

/* Error bar */
.errbar{
  display:none;flex-shrink:0;background:rgba(255,77,109,.06);
  border-top:1px solid rgba(255,77,109,.25);padding:6px 12px;
  font-size:10px;color:var(--error);max-height:72px;overflow-y:auto;white-space:pre-wrap;
}
.errbar.on{display:block}

/* Stats */
.stats{
  flex-shrink:0;height:30px;display:flex;align-items:center;gap:14px;
  padding:0 16px;background:var(--bg2);border-top:1px solid var(--border);
  font-size:10px;color:var(--text3);
}
.sv{color:var(--text2);font-weight:600;margin-left:3px}
.sv.g{color:var(--success)}.sv.b{color:var(--accent)}.sv.p{color:var(--accent2)}
.ss{color:var(--border2)}

/* Toast */
#toast{
  position:fixed;bottom:16px;right:16px;z-index:999;
  padding:10px 14px;border-radius:var(--r);font-size:11px;
  transform:translateY(50px);opacity:0;transition:.25s cubic-bezier(.16,1,.3,1);
  max-width:340px;line-height:1.5;pointer-events:none;
}
#toast.on{transform:translateY(0);opacity:1}
#toast.s{background:rgba(0,255,136,.1);border:1px solid var(--success);color:var(--success)}
#toast.e{background:rgba(255,77,109,.1);border:1px solid var(--error);color:var(--error)}
#toast.i{background:rgba(0,212,255,.08);border:1px solid var(--accent);color:var(--accent)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">
    <div class="logo-icon">🔮</div>
    <div>
      <div class="logo-name">LUMARGE</div>
      <div class="logo-tag">Lua / Luau Obfuscator</div>
    </div>
  </div>
  <div class="hbadge">
    <div class="hdot spin" id="hDot"></div>
    <span id="hTxt">Checking...</span>
  </div>
</header>

<div class="body">

  <div class="sidebar">
    <div class="sb-head">⚙ Configuration</div>
    <div class="sb-body">

      <div class="og">
        <div class="ol">Target Version</div>
        <div class="vpills">
          <div class="vpill on" data-v="lua51">5.1</div>
          <div class="vpill" data-v="lua54">5.4</div>
          <div class="vpill" data-v="luau">Luau</div>
        </div>
      </div>

      <div class="og">
        <div class="ol">Preset</div>
        <div class="pills">
          <div class="pill" data-p="minify">Minify</div>
          <div class="pill" data-p="weak">Weak</div>
          <div class="pill on" data-p="medium">Medium</div>
          <div class="pill" data-p="strong">Strong</div>
        </div>
      </div>

      <div class="og">
        <div class="ol">Rename Variables</div>
        <select id="renVar">
          <option value="">— default —</option>
          <option value="enable">Enable</option>
          <option value="disable">Disable</option>
          <option value="number">Number</option>
          <option value="mangled">Mangled</option>
          <option value="mangledShuffled">Mangled Shuffled</option>
        </select>
      </div>

      <div class="og">
        <div class="ol">Random Seed</div>
        <div class="seed-row">
          <input type="number" id="seed" placeholder="Auto (random)"/>
          <button class="dice" id="dice" title="Random seed">🎲</button>
        </div>
      </div>

      <div class="og">
        <div class="ol">Options</div>
        <div class="trow">
          <span>Pretty Print</span>
          <label class="tog"><input type="checkbox" id="pretty"/><span class="sld"></span></label>
        </div>
        <div class="trow">
          <span>Lua Bundle</span>
          <label class="tog"><input type="checkbox" id="bundle"/><span class="sld"></span></label>
        </div>
      </div>

      <div class="div"></div>

      <div class="og">
        <button class="btn-go" id="goBtn">▶ OBFUSCATE</button>
        <div style="height:5px"></div>
        <button class="btn-clr" id="clrBtn">✕ Clear All</button>
      </div>

      <div class="kbhint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</div>

    </div>
  </div>

  <div class="editors">
    <div class="panels">

      <!-- Input -->
      <div class="panel">
        <div class="ph">
          <div class="ptitle"><div class="pdot d-in"></div>INPUT</div>
          <div class="pacts">
            <button class="ibtn" id="pasteBtn">⌘ Paste</button>
            <button class="ibtn" id="uploadBtn">↑ Upload</button>
            <input type="file" id="fileIn" accept=".lua,.luau" style="display:none"/>
          </div>
        </div>
        <div class="ew">
          <div class="ln" id="inLn">1</div>
          <textarea id="inCode"
            placeholder="-- Paste your Lua / Luau code here..."
            spellcheck="false"></textarea>
        </div>
        <div class="errbar" id="errBar"></div>
      </div>

      <!-- Output -->
      <div class="panel">
        <div class="ph">
          <div class="ptitle">
            <div class="pdot d-out" id="outDot"></div>OUTPUT
          </div>
          <div class="pacts">
            <button class="ibtn" id="copyBtn">⎘ Copy</button>
            <button class="ibtn" id="dlBtn">↓ Download</button>
          </div>
        </div>
        <div class="ew">
          <div class="ln" id="outLn">1</div>
          <textarea id="outCode" readonly
            placeholder="// Obfuscated output appears here..."
            spellcheck="false"></textarea>
          <div class="spin-ov" id="spinOv">
            <div class="ring"></div>
            <div class="spin-lbl">OBFUSCATING...</div>
          </div>
        </div>
      </div>

    </div>

    <div class="stats">
      <span>Input:<span class="sv" id="sIn">0 B</span></span>
      <span class="ss">|</span>
      <span>Output:<span class="sv g" id="sOut">—</span></span>
      <span class="ss">|</span>
      <span>Ratio:<span class="sv b" id="sRatio">—</span></span>
      <span class="ss">|</span>
      <span>Time:<span class="sv p" id="sTime">—</span></span>
      <span class="ss">|</span>
      <span>Lines:<span class="sv" id="sLines">0</span></span>
    </div>
  </div>

</div>
</div>

<div id="toast"></div>

<script>
let selV = 'lua51', selP = 'medium';
const inCode  = document.getElementById('inCode');
const outCode = document.getElementById('outCode');
const goBtn   = document.getElementById('goBtn');
const errBar  = document.getElementById('errBar');
const spinOv  = document.getElementById('spinOv');

// Health
(async () => {
  try {
    const d = await (await fetch('/api/health')).json();
    const dot = document.getElementById('hDot');
    const txt = document.getElementById('hTxt');
    dot.className = 'hdot ' + (d.lumargeReady ? 'ok' : 'err');
    txt.textContent = d.lumargeReady ? `Ready · ${d.lua}` : `Lua:${d.lua} | CLI:${d.lumarge}`;
  } catch {
    document.getElementById('hDot').className = 'hdot err';
    document.getElementById('hTxt').textContent = 'Server offline';
  }
})();

// Pills
document.querySelectorAll('.vpill').forEach(p =>
  p.addEventListener('click', () => {
    document.querySelectorAll('.vpill').forEach(x => x.classList.remove('on'));
    p.classList.add('on'); selV = p.dataset.v;
  }));
document.querySelectorAll('.pill').forEach(p =>
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
    p.classList.add('on'); selP = p.dataset.p;
  }));

// Dice
document.getElementById('dice').addEventListener('click', () =>
  document.getElementById('seed').value = Math.floor(Math.random() * 999999) + 1);

// Line numbers
function setLn(ta, el) {
  const n = ta.value.split('\n').length;
  el.textContent = Array.from({length: n}, (_, i) => i + 1).join('\n');
}
function bindEditor(ta, lnEl) {
  setLn(ta, lnEl);
  ta.addEventListener('input', () => setLn(ta, lnEl));
  ta.addEventListener('scroll', () => lnEl.scrollTop = ta.scrollTop);
  ta.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const s = ta.selectionStart;
    ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
    setLn(ta, lnEl);
  });
}
bindEditor(inCode, document.getElementById('inLn'));
bindEditor(outCode, document.getElementById('outLn'));

// Stats
function fmt(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}
inCode.addEventListener('input', () => {
  document.getElementById('sIn').textContent    = fmt(new TextEncoder().encode(inCode.value).length);
  document.getElementById('sLines').textContent = inCode.value.split('\n').length;
});

// Upload
document.getElementById('uploadBtn').addEventListener('click', () =>
  document.getElementById('fileIn').click());
document.getElementById('fileIn').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  new FileReader().onload = ev => {
    inCode.value = ev.target.result;
    inCode.dispatchEvent(new Event('input'));
    setLn(inCode, document.getElementById('inLn'));
    toast('Loaded: ' + f.name, 'i');
  }, new FileReader().readAsText(f);
  // simpler:
  const r = new FileReader();
  r.onload = ev => {
    inCode.value = ev.target.result;
    inCode.dispatchEvent(new Event('input'));
    setLn(inCode, document.getElementById('inLn'));
    toast('Loaded: ' + f.name, 'i');
  };
  r.readAsText(f);
  e.target.value = '';
});

// Paste
document.getElementById('pasteBtn').addEventListener('click', async () => {
  try {
    inCode.value = await navigator.clipboard.readText();
    inCode.dispatchEvent(new Event('input'));
    setLn(inCode, document.getElementById('inLn'));
    toast('Pasted from clipboard', 'i');
  } catch { toast('Cannot access clipboard', 'e'); }
});

// Copy
document.getElementById('copyBtn').addEventListener('click', async () => {
  if (!outCode.value) return toast('No output to copy', 'e');
  await navigator.clipboard.writeText(outCode.value);
  toast('Copied!', 's');
});

// Download
document.getElementById('dlBtn').addEventListener('click', () => {
  if (!outCode.value) return toast('No output to download', 'e');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([outCode.value], {type:'text/plain'}));
  a.download = 'obfuscated.lua';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Downloaded!', 's');
});

// Clear
document.getElementById('clrBtn').addEventListener('click', () => {
  inCode.value = ''; outCode.value = '';
  errBar.textContent = ''; errBar.classList.remove('on');
  ['sOut','sRatio','sTime'].forEach(id => document.getElementById(id).textContent = '—');
  document.getElementById('sIn').textContent    = '0 B';
  document.getElementById('sLines').textContent = '0';
  document.getElementById('inLn').textContent   = '1';
  document.getElementById('outLn').textContent  = '1';
  document.getElementById('outDot').className   = 'pdot d-out';
});

// Obfuscate
goBtn.addEventListener('click', run);
document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run(); });

async function run() {
  const code = inCode.value.trim();
  if (!code) return toast('No code to obfuscate', 'e');

  goBtn.disabled = true;
  goBtn.textContent = '⏳ Working...';
  goBtn.classList.add('busy');
  spinOv.classList.add('on');
  errBar.classList.remove('on');
  outCode.value = '';

  try {
    const res  = await fetch('/api/obfuscate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        code, version: selV, preset: selP,
        seed:         document.getElementById('seed').value || undefined,
        pretty:       document.getElementById('pretty').checked,
        renVariables: document.getElementById('renVar').value || undefined,
        bundle:       document.getElementById('bundle').checked,
      })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      errBar.textContent = data.error || 'Unknown error';
      errBar.classList.add('on');
      toast('Obfuscation failed', 'e');
    } else {
      outCode.value = data.code;
      setLn(outCode, document.getElementById('outLn'));
      const s = data.stats;
      document.getElementById('sOut').textContent   = fmt(s.obfuscatedSize);
      document.getElementById('sRatio').textContent = s.ratio + '%';
      document.getElementById('sTime').textContent  = s.elapsed + 'ms';
      document.getElementById('outDot').className   = 'pdot d-out done';
      toast(`Done · ${fmt(s.originalSize)} → ${fmt(s.obfuscatedSize)} in ${s.elapsed}ms`, 's');
    }
  } catch (err) {
    errBar.textContent = 'Network error: ' + err.message;
    errBar.classList.add('on');
    toast('Network error', 'e');
  } finally {
    goBtn.disabled = false;
    goBtn.textContent = '▶ OBFUSCATE';
    goBtn.classList.remove('busy');
    spinOv.classList.remove('on');
  }
}

// Toast
let tt;
function toast(msg, t = 'i') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'on ' + t;
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('on'), 3000);
}
</script>
</body>
